<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get a Quote | Legacy Launchpad</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8fafc; color: #1e293b; line-height: 1.5; }
        .container { max-width: 700px; margin: 0 auto; padding: 20px; }
        .header { background: #0f172a; color: white; padding: 20px 0; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .logo-placeholder { width: 50px; height: 50px; background: #fbbf24; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: #0f172a; }
        .logo-text h1 { font-size: 1.5rem; letter-spacing: -0.5px; }
        .nav a { color: white; text-decoration: none; margin-left: 25px; }
        .form-card { background: white; border-radius: 24px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin: 40px 0; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: inherit; }
        .btn { background: #fbbf24; color: #0f172a; padding: 12px 25px; border: none; border-radius: 40px; font-weight: bold; cursor: pointer; }
        .footer { background: #0f172a; color: #94a3b8; text-align: center; padding: 30px 0; margin-top: 40px; }
        @media (max-width: 768px) { .header-flex { flex-direction: column; text-align: center; } .nav a { margin: 0 10px; } }
    </style>
</head>
<body>
<div class="header">
    <div class="header-flex">
        <div class="logo-area"><div class="logo-placeholder"><i class="fas fa-cube"></i></div><div class="logo-text"><h1>Legacy Launchpad</h1><p>Building what lasts.</p></div></div>
        <div class="nav"><a href="index.html">Home</a><a href="personal-services.html">Personal Services</a><a href="index.html#contact">Contact</a></div>
    </div>
</div>
<div class="container">
    <div class="form-card">
        <h2 style="margin-bottom: 20px;">📋 Request a Quote</h2>
        <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
            <div class="form-group"><label>Your name</label><input type="text" name="name" required></div>
            <div class="form-group"><label>Email address</label><input type="email" name="email" required></div>
            <div class="form-group"><label>Phone number</label><input type="tel" name="phone"></div>
            <div class="form-group"><label>Service required</label>
                <select name="service" id="serviceSelect">
                    <option value="UIF">UIF Application Assistance</option>
                    <option value="ID-Passport">ID & Passport Assistance</option>
                    <option value="Artist-Profile">Professional Artist Profile</option>
                    <option value="CV-CoverLetter">CV & Cover Letter</option>
                    <option value="SASSA">SASSA Grant Application</option>
                    <option value="Other">Other (please specify)</option>
                </select>
            </div>
            <div class="form-group"><label>Additional details</label><textarea name="message" rows="5" placeholder="Tell us more about what you need..."></textarea></div>
            <button type="submit" class="btn">Send Request →</button>
        </form>
        <p style="margin-top: 20px; font-size: 0.85rem;">* We will respond within 24 hours. Your information is POPIA compliant.</p>
    </div>
</div>
<div class="footer">© 2025 Legacy Launchpad (Pty) Ltd – Building what lasts.</div>
<script>
    // Pre-fill service from URL parameter
    const urlParams = new URLSearchParams(window.location.search);
    const serviceParam = urlParams.get('service');
    if (serviceParam) {
        const select = document.getElementById('serviceSelect');
        if (select) {
            for (let i = 0; i < select.options.length; i++) {
                if (select.options[i].value === serviceParam) {
                    select.selectedIndex = i;
                    break;
                }
            }
        }
    }
</script>
</body>
</html>
